name: Build Staging

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test --run

  build-push:
    needs: [lint-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Short SHA
        id: short_sha
        run: echo "value=$(echo ${{ github.sha }} | head -c 7)" >> $GITHUB_OUTPUT

      - name: Build and push staging image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://staging.gift.VOTRE_DOMAINE.com
          tags: |
            ghcr.io/${{ github.repository_owner }}/gift-frontend:main
            ghcr.io/${{ github.repository_owner }}/gift-frontend:main-${{ steps.short_sha.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
